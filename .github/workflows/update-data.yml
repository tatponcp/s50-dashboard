# ============================================================
# update-data.yml — GitHub Actions: อัปเดตข้อมูลอัตโนมัติทุกเย็น
# ------------------------------------------------------------
# ทำงานเอง จันทร์-ศุกร์ 19:30 เวลาไทย (หลัง TFEX ประกาศราคา settlement)
# ขั้นตอน: รัน scraper → ถ้าข้อมูลผ่าน validation → commit data.json
# → GitHub Pages เผยแพร่เวอร์ชันใหม่ให้เอง (ไม่ต้องทำอะไรเพิ่ม)
#
# รันมือ: เข้า GitHub → tab "Actions" → เลือก workflow นี้ → "Run workflow"
# ============================================================
name: Update SET50 options data

on:
  schedule:
    # จันทร์-ศุกร์ 19:30 เวลาไทย = 12:30 UTC (GitHub ใช้เวลา UTC)
    - cron: "30 12 * * 1-5"
  workflow_dispatch: {}   # ปุ่มกดรันมือจากหน้า Actions

permissions:
  contents: write   # ต้องมีสิทธิ์ commit data.json กลับเข้า repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/tfex_scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "ข้อมูลไม่เปลี่ยน — ไม่ต้อง commit"
          else
            git commit -m "chore: update SET50 options data $(date -u +'%Y-%m-%d')"
            git push
          fi
